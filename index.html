<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f0f2f5;
overflow-x:hidden;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://i.pinimg.com/736x/5a/5b/46/5a5b462015095c2bc12ba59c45f15ce4.jpg') center/cover;
filter:blur(15px);
transform:scale(1.1);
opacity:.3;
z-index:-1;
}

.container{
width:100%;
max-width:720px;
margin:auto;
padding:8px 6px 100px;
}

.modal{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,.25);
margin-bottom:20px;
}

.top{
padding:15px;
font-size:26px;
font-weight:bold;
text-align:center;
border-bottom:1px solid #ddd;
}

.post{
display:flex;
align-items:center;
padding:12px;
}

.avatar{
width:42px;
height:42px;
border-radius:50%;
margin-right:10px;
object-fit:cover;
}

.name{
font-weight:bold;
font-size:15px;
}

.time{
font-size:13px;
color:#777;
margin-top:2px;
}

.video{
position:relative;
background:#000;
cursor:pointer;
}

.video img{
width:100%;
display:block;
}

.overlay-text{
position:absolute;
top:15px;
left:15px;
right:15px;
background:rgba(0,0,0,.65);
color:white;
padding:12px;
border-radius:12px;
font-size:22px;
font-weight:bold;
text-align:center;
backdrop-filter:blur(4px);
text-shadow:0 2px 8px rgba(0,0,0,.6);
animation:pulseText 1.5s infinite;
}

@keyframes pulseText{
0%{transform:scale(1);}
50%{transform:scale(1.03);}
100%{transform:scale(1);}
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
color:white;
text-shadow:0 0 20px rgba(0,0,0,.5);
}

.caption{
padding:14px;
font-size:20px;
font-weight:bold;
}

.stats{
display:flex;
justify-content:space-between;
padding:0 14px 12px;
font-size:14px;
color:#666;
}

.actions{
display:flex;
justify-content:space-around;
padding:12px;
border-top:1px solid #eee;
font-weight:bold;
color:#666;
}

.gallery{
padding:12px;
display:grid;
grid-template-columns:1fr;
gap:14px;
}

.gallery img{
width:100%;
border-radius:14px;
cursor:pointer;
transition:.2s;
max-height:650px;
object-fit:cover;
}

.gallery img:hover{
transform:scale(1.02);
}

.btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#1877f2;
color:white;
padding:15px 30px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
z-index:99;
box-shadow:0 5px 20px rgba(24,119,242,.5);
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:translateX(-50%) scale(1);}
50%{transform:translateX(-50%) scale(1.05);}
100%{transform:translateX(-50%) scale(1);}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="modal">

<div class="top">
Trending Post
</div>

<div class="post">
<img class="avatar" src="https://i.pinimg.com/736x/5a/5b/46/5a5b462015095c2bc12ba59c45f15ce4.jpg">

<div>
<div class="name">Emily Carter</div>
<div class="time">12h · Public</div>
</div>
</div>

<div class="video" onclick="goLink()">

<img src="https://i.pinimg.com/736x/5a/5b/46/5a5b462015095c2bc12ba59c45f15ce4.jpg">
